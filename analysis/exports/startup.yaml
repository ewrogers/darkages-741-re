comments:
  - address: "0x0042E600"
    text: Bink frame timer. Advances from the first clip to the second, then posts intro state 2 after both clips finish.
  - address: "0x004ACA85"
    text: Intro state transition. Original push 1 enters Bink playback; changing the immediate to 2 reuses the normal post-video state and skips allocation/playback safely.
  - address: "0x004ACAF1"
    text: Fetch the global intro video pane; the following call starts CIf.bik and CIb.bik.
  - address: "0x004ACAF8"
    text: Begin the two-clip intro sequence using CIf.bik followed by CIb.bik.
  - address: "0x004ACE1B"
    text: "Copy the SAdvertisement argument bytes into the application-owned 65,536-byte post-exit buffer and append a local NUL."
  - address: "0x004ACE32"
    text: "Save argument_length as the post-exit launch gate, followed by the two u16 values and final u8 value widened to 32-bit integers."
  - address: "0x0052845A"
    text: "SVersionCheck subtype 2 patch notice: u16be required version, followed by u8 file count and repeated u8-length file names."
  - address: "0x005284B3"
    text: "Copy each u8-length patch file name into its own 256-byte slot in the Patch/Info handoff."
  - address: "0x005286C4"
    text: "Write the 0x10606-byte Patch/Info handoff containing local and required versions, file slots, command line, executable name, and data filename."
  - address: "0x00528740"
    text: "Launch Patcher2.exe without a command line; the patcher consumes Patch/Info. The client exits immediately afterward."
  - address: "0x0057A385"
    text: "Startup patch recovery requires both Patch/Info and Patch/Script. An incomplete pair is deleted instead of launching Patcher2.exe."
  - address: "0x0057A7C3"
    text: Create the named Nexon.SingleInstance mutex and preserve its handle for normal shutdown cleanup.
  - address: "0x0057A7D4"
    text: ERROR_ALREADY_EXISTS (0xB7) means another client already owns the named mutex.
  - address: "0x0057A7D9"
    text: Single-instance gate. Original JNE +7 continues only when the mutex was newly created; a one-byte 0x75 to 0xEB patch always takes the normal startup path.
  - address: "0x0057A9F7"
    text: "After normal app_shutdown completes, attempt the deferred advertisement launch only when the saved argument length is greater than zero."
  - address: "0x0057AA12"
    text: "Build the exact command line ad.exe %s %d %d %d from the saved SAdvertisement string and three numeric values."
  - address: "0x0057AA5F"
    text: "Start the fixed application name ad.exe with the assembled command line. The return value is ignored, so a missing executable fails silently."
  - address: "0x0057AA65"
    text: Close app_single_instance_mutex during normal shutdown, then clear the global handle.
