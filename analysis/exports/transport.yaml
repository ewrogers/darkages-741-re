  - address: "0x00567FC1"
    text: "Write the current client-to-server sequence, increment the byte for the next encrypted packet, transform the payload, and add the outbound authentication and seed trailer."
  - address: "0x005680B8"
    text: "Mode 0 XORs with the static key; mode 1 XORs with the per-packet derived 9-byte key."
  - address: "0x005681A1"
    text: "MD5 the outbound opcode, sequence, and transformed payload; append digest bytes 13, 3, 11, and 7 before the three encoded seed bytes."
  - address: "0x005684CE"
    text: "Build a 1024-byte salt source by repeated lowercase MD5-hex expansion of the runtime seed string."
  - address: "0x00568572"
    text: "Derive nine key bytes from the 1024-byte MD5 salt source using the 16-bit and 8-bit packet seed values."
  - address: "0x0056867B"
    text: "Generate a 256-entry repeated-byte XOR table. Selectors 0 through 9 choose deterministic mappings; some mappings contain duplicate byte values and are not permutations."
  - address: "0x0056869B"
    text: "Selector 0: identity mapping, b = i."
  - address: "0x005686A6"
    text: "Selector 1: center-out mapping, b = 0x80 + ((i & 1) ? -((i + 1) / 2) : ((i + 1) / 2))."
  - address: "0x005686DB"
    text: "Selector 2: reverse mapping, b = 0xFF - i."
  - address: "0x005686EB"
    text: "Selector 3: b = 0x80 + ((i & 1) ? -((0xFF - i) / 2) : ((0xFF - i) / 2))."
  - address: "0x00568722"
    text: "Selector 4: b = (i / 16) * (i / 16)."
  - address: "0x00568747"
    text: "Selector 5: b = (u8)(i * 2)."
  - address: "0x00568764"
    text: "Selector 6: b = 0xFF - (u8)(i * 2)."
  - address: "0x00568786"
    text: "Selector 7: b = i <= 0x7F ? 0xFF - 2*i : 2*i - 0x100."
  - address: "0x005687AC"
    text: "Selector 8: b = i <= 0x7F ? 2*i : 0x1FF - 2*i."
  - address: "0x005687CD"
    text: "Selector 9: n = (i - 0x80) / 8 with signed truncation toward zero; b = 0xFF - (u8)(n*n)."
  - address: "0x00595F4F"
    text: "Register opcode-specific server packet constructors in the 256-entry factory. Derived server packet names are recoverable through RTTI."
  - address: "0x00596469"
    text: "Construct a packet reader over the decoded body and invoke the packet class deserializer at vtable slot +8."
  - address: "0x005ED9B3"
