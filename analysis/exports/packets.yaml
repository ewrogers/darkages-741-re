  - address: "0x005FD0E7"
    text: "Store the opaque stats u32 in WorldUserFunc. The value is write-only in the static client paths checked."
  - address: "0x005FD150"
    text: "Copy six retained modifier bytes, including blind code and raw mail state, into WorldUserFunc. The four reserved bytes are not consumed elsewhere."
  - address: "0x005FD1E6"
    text: "WorldUserFunc accepts SAddInventory slots 1 through 60 and retains only sprite, dye color, and name in its compact record."
  - address: "0x005FD232"
    text: "WorldUserFunc accepts SRemoveInventory slots 1 through 60 and ignores values outside that range."
  - address: "0x005FD27F"
    text: "Session spell storage accepts slots 1 through 89."
  - address: "0x005FD291"
    text: "Session spell storage accepts spell argument types 1 through 8."
  - address: "0x005FD302"
    text: "Session removal accepts spell slots 1 through 89; other values are ignored."
  - address: "0x005FD342"
    text: "Session skill insertion accepts slots 1 through 89; other values are ignored."
  - address: "0x005FD35B"
    text: "Store the SAddSkill icon and name in the matching WorldUserFunc skill record."
  - address: "0x005FD392"
    text: "Session skill removal accepts slots 1 through 89; other values are ignored."
  - address: "0x005FD3CC"
    text: "Store appearance_state & 0x7F at WorldUserFunc +0x15C88. Bit 0 blocks local movement and several actions; this is the field's only runtime writer."
  - address: "0x005FD3DC"
    text: "Bit 0x80 means the packet only changes the stored low-seven-bit state. Other self appearance fields remain unchanged."
  - address: "0x005FD3FA"
    text: "Store cached facing at WorldUserFunc +0x1054. No later direct reader is present in this client."
  - address: "0x005FD409"
    text: "Store the raw guild value at WorldUserFunc +0x1088 without boolean normalization."
  - address: "0x005FD418"
    text: "Store the character-class byte at WorldUserFunc +0x1089."
  - address: "0x005FD427"
    text: "Store the final unknown appearance byte at WorldUserFunc +0x108A. WorldPane_Impl exposes it through a getter, but no direct behavior is identified."
  - address: "0x00667B38"
    text: "Register the SBadGuy constructor in the server_packet_factory initialization path."
