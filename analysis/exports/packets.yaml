    text: "Write CreateUserDialogPane +0x676 as the hair-style ID. Male supports 1 through 18 and female 1 through 17."
  - address: "0x0043E956"
    text: "Encode CreateUserDialogPane +0x674 gender index as 1 for male or 2 for female."
  - address: "0x0043E98D"
    text: "Write CreateUserDialogPane +0x678 as the hair-color palette index 0 through 13."
  - address: "0x0043ECB9"
    text: "The active USA distribution stores literal none as the third CNewUser string. Japan mode 13 can read the Email control instead."
  - address: "0x005962D3"
    text: "The factory installs no constructor for server opcode 0x58 or 0x67. Both remain raw decoded bodies with a null packet-object slot."
  - address: "0x005EE185"
    text: "Unhandled WorldPane server events return false here. There is no branch for raw opcode 0x58 or 0x67."
  - address: "0x005F2AEB"
    text: "Create MapLoadingPane on the first SMapPart body when a map transfer is active."
  - address: "0x005F2C31"
    text: "Set map-transfer progress to (part_index + 1) * 100 / total_parts."
  - address: "0x005F2C87"
    text: "The final map part closes the loading pane, updates and writes the map cache, then applies the completed map."
