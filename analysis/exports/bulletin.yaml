    text: "SBulletin response codes 1 through 5 open BoardListDialog, ArticleListDialog, ArticleDialog, MailListDialog, and MailDialog."
  - address: "0x0041E3AB"
    text: "CBulletin action 2 requests an initial article or mail list page."
  - address: "0x0041F48A"
    text: "SBulletin response 7 supplies an operation status and string8 message."
  - address: "0x0041F490"
    text: "SBulletin response 8 supplies a post status and refreshes the article list."
  - address: "0x00420FDB"
    text: "CBulletin action 7 applies the optional layout control spelled Hilight to an article."
  - address: "0x004210EB"
    text: "CBulletin action 5 deletes an article selected in the list."
  - address: "0x00422CF1"
    text: "CBulletin action 4 posts an article as board ID, string8 title, and string16 content."
  - address: "0x00424D1B"
    text: "CBulletin action 5 deletes mail from the list and uniquely appends a zero byte."
  - address: "0x00426A2A"
    text: "CBulletin action 6 sends mail as mailbox ID, receiver, title, and content."
  - address: "0x005EDFB9"
    text: "Decoded opcode 0x31 bypasses the server packet factory and is handled directly as owner-named SBulletin."
