  - address: "0x00566D93"
    text: Close the active Winsock socket and restore the socket field to INVALID_SOCKET.
  - address: "0x00567413"
    text: "Fresh TCP raw-stream mode: call recv and post the complete wire bytes without checking the 0xAA header, length, opcode, or transform."
