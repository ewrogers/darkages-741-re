comments:
  - address: "0x00431F65"
    text: Build %SystemRoot%\System32\Mscfg.dll and test whether it exists. The resulting flag later selects TCP port 2601 instead of 2610; the marker's wider purpose is not yet confirmed in the new analysis.
  - address: "0x00431F82"
    text: Mscfg.dll exists. Set config +0x668 so endpoint setup and retry use TCP port 2601.
  - address: "0x00432253"
    text: Original distribution-mode 1 endpoint initializer call. A verified runtime patch can retarget this five-byte CALL to net_parse_endpoint_override while preserving mode 1 for downstream behavior.
  - address: "0x00433029"
    text: "Dormant positional endpoint parser: reads the full command line as Darkages.exe <IPv4-or-hostname> [port]. Mode 1 never calls this function."
  - address: "0x004330B3"
    text: First positional argument after the executable is treated as dotted IPv4 when it begins with a digit; otherwise it is resolved as a hostname.
  - address: "0x00433213"
    text: "Dormant hostname-override DNS failure fallback: set 210.101.85.25:2610, clear the accepted-override flags, and return false."
  - address: "0x0043326C"
    text: Parse the optional second positional argument as a port. Missing or zero selects port 23 and marks the default-port condition.
  - address: "0x00433312"
    text: "No usable positional endpoint: set 52.88.55.94:2610, clear the accepted-override flags, and return false."
  - address: "0x00433396"
    text: Active mode 1 endpoint lookup. Resolve da0.kru.com and copy only the first returned IPv4 address.
  - address: "0x004333C2"
    text: Initial DNS lookup failed. Use the hardcoded IPv4 fallback 52.88.55.94.
  - address: "0x004333E3"
    text: Set the normal mode 1 TCP port to 2610 before checking the Mscfg.dll marker flag.
  - address: "0x00433401"
    text: "Mscfg.dll marker present: replace the normal port 2610 with 2601."
  - address: "0x00434EF7"
    text: Build selector is hardcoded to distribution mode 1. This makes alternate-mode command-line endpoint parsers unreachable in normal execution.
  - address: "0x004AD3B3"
    text: Read the full command line only to derive the executable directory and make it the process working directory; this is not an option parser.
  - address: "0x0056463D"
    text: Transport selector 5 opens the TCP path and begins the initial endpoint connection.
  - address: "0x0056537E"
    text: Initialize Winsock 1.1. Startup failure or a returned version other than 1.1 terminates the process.
  - address: "0x005653CD"
    text: socket(AF_INET, SOCK_STREAM) failed. Map WSAGetLastError to a networkError message and raise the client's fatal exception path.
  - address: "0x005655D0"
    text: Primary blocking TCP connect using config IPv4 and htons(base port + signed port offset). Mode 1 uses 2610 normally or 2601 when marked.
  - address: "0x005655F4"
    text: Primary connect failure enters the hardcoded da0.kru.com retry block here. The verified connect-or-fail runtime patch replaces this complete 10-byte MOV with a JMP to shared socket and Winsock cleanup at 0x5668FF.
  - address: "0x00565622"
    text: Primary connect failed. Resolve da0.kru.com again so DNS rotation or recovery can provide a fresh first IPv4 address.
  - address: "0x00565686"
    text: Fresh DNS lookup failed after the primary connect failure. The active path terminates the process with exit code 0.
  - address: "0x00565779"
    text: Second and final active-mode TCP connect attempt using the freshly resolved da0.kru.com address.
  - address: "0x005657C1"
    text: Second connect failed. Close the socket and return with INVALID_SOCKET; this routine shows no error dialog and makes no third active-mode attempt.
  - address: "0x005668FF"
    text: "Shared connection-failure cleanup: close the current socket, store INVALID_SOCKET, call WSACleanup, and return. The connect-or-fail runtime patch targets this block."
  - address: "0x005657D0"
    text: Second connect succeeded. A one-time side path records the selected IPv4 and port in iplookup.tbl; failure to open that file shows a damaged-file message and exits.
  - address: "0x005658E1"
    text: Alternate distribution-mode mServer.tbl rotation begins here. Hardcoded mode 1 does not enter this fallback loop.
  - address: "0x005668ED"
    text: On a successful mode 1 connection, register WSAAsyncSelect message 0x401 for FD_READ | FD_CLOSE. Registration failure terminates the process.
  - address: "0x00566D93"
    text: Close the active Winsock socket and restore the socket field to INVALID_SOCKET.
  - address: "0x0057A5D4"
    text: Copy one dash-prefixed token, delimited only by ASCII space. Only an uppercase D token is recognized.
  - address: "0x0057A60D"
    text: Recognized -D... token. The suffix is passed to app_handle_d_option_stub, which immediately returns and changes no state.
  - address: "0x0057A7A3"
    text: Parse the WinMain command tail. In this binary the only recognized dash token is -D..., and its handler is a no-op.
runtime_patches:
  - id: enable-command-line-endpoint
    rva: "0x00032253"
    static_address: "0x00432253"
    file_offset_for_reference_only: "0x00031653"
    original_bytes: E8 28 11 00 00
    replacement_bytes: E8 B8 0D 00 00
    effect: Redirect mode 1 endpoint initialization to the existing positional IPv4-or-hostname and port parser while preserving mode 1 for downstream behavior.
  - id: disable-official-endpoint-fallback
    rva: "0x001655F4"
    static_address: "0x005655F4"
    file_offset_for_reference_only: "0x001649F4"
    original_bytes: C7 85 94 FB FF FF 00 00 00 00
    replacement_bytes: E9 06 13 00 00 90 90 90 90 90
    effect: On primary connect failure, jump directly to shared socket and Winsock cleanup instead of resolving da0.kru.com and attempting a second connection.
