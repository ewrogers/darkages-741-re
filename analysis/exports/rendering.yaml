comments:
  - address: "0x0040D4A0"
    text: Blend mode 0x6D uses a screen-style per-component software blend in RGB565 or RGB555.
  - address: "0x0044DE30"
    text: Software Image blitter. Numeric mode selects normal copy, blend-table paths, per-pixel alpha, color effects, or a second image plane.
  - address: "0x0044FB80"
    text: Software PixMap blitter. The common sprite paths treat source pixel zero as transparent.
  - address: "0x004526C0"
    text: Blit a one-bit glyph or mask into the 16-bit software Canvas. The selected mode controls foreground, background, transparency, and averaging.
  - address: "0x00453EFC"
    text: Apply ordered palette mappings during indexed PixMap drawing. Each mapping covers one source-index range and selects a replacement palette family and selector.
  - address: "0x00455BBE"
    text: Split the ANSI byte string with IsDBCSLeadByte. A DBCS pair becomes one 16-bit key with the lead byte in the high half.
  - address: "0x00456F87"
    text: Read EFA header +0x04 as frame_count, then +0x08 as frame_interval_ms. Ordinary world effects prefer a nonzero EFA interval over SEffectLayer's fallback timer.
  - address: "0x0047B902"
    text: Select lod.lft for mode 0, da.lft for mode 1, yami.lft for mode 2, or taiwan.lft for mode 3.
  - address: "0x0047BC09"
    text: Expand LFT rows from their four-byte-aligned source into a one-byte or two-byte-per-row temporary mask according to the glyph advance.
  - address: "0x004A4D25"
    text: Korean language mode records Windows code page 949; Japanese mode records 932. Other modes leave the code-page value at the system default.
  - address: "0x004C7280"
    text: Open one raw ground-tile bank. Records are fixed 0x5E8-byte blocks, not Windows BMP files; the bank kind selects the palette path.
  - address: "0x004C7390"
    text: Decode one fixed 0x5E8-byte raw tile record as a 56 by 27 indexed slot and pack its 784 diamond pixels into 16-bit color.
  - address: "0x004C78C0"
    text: Apply ground animation first. In alternate mode, try tileas.bmp and fall back to tilea.bmp when the requested alternate record is unavailable.
  - address: "0x00555560"
    text: Recursive pane draw. Clip the pane, invoke primary vtable slot 0x5C, then walk its child subtree.
  - address: "0x0057A6C0"
    text: Select 2x presentation only when desktop color depth is 16 or 32 bits and the current display is at least 1280 by 960; otherwise select 1x for a supported smaller display.
  - address: "0x0057A7E2"
    text: Store the fixed logical width 640 and height 480 before choosing the presentation scale.
  - address: "0x0057A916"
    text: Display mode 2 enables the 2x scale flag while leaving the logical 640 by 480 dimensions unchanged.
  - address: "0x0058747B"
    text: Load gndani.tbl. Each text line is a tile-ID cycle followed by a delay measured in 100 ms ticks.
  - address: "0x005875D2"
    text: Load stcani.tbl. It uses the same line format as gndani.tbl but remaps static tile IDs.
  - address: "0x00587DD9"
    text: Start the shared tile-animation timer at 100 ms. Table delays count these ticks.
  - address: "0x00593490"
    text: Build the two software component tables used by the 16-bit pixel blend helper.
  - address: "0x00593F30"
    text: Initialize DirectDraw presentation, the main and output canvases, color conversion helpers, and blend tables.
  - address: "0x00594250"
    text: Release canvas and software renderer helpers. DirectDraw is released later by the VideoSystem destructor.
  - address: "0x005942D0"
    text: Present the finished software canvas through DirectDraw or the window DC path.
  - address: "0x00598210"
    text: Deserialize the one-byte SChangeWeather payload. No 0x1F consumer exists in the main gameplay dispatcher.
  - address: "0x0059DCD5"
    text: Read BTN_HELP from the current GUIBackPane layout; ui_gui_back_apply_layout later copies this rectangle into action slot 0.
  - address: "0x005A0B9E"
    text: GUIBackPane action 0 creates the RTTI-backed HotKeyPane through ui_create_hot_key_pane.
  - address: "0x005A0E16"
    text: Dispatch the left-clicked bottom action index after hit testing and debounce; index 0 is BTN_HELP.
  - address: "0x005A0FA2"
    text: BTN_HELP also participates in the pointer-move tooltip path, separately from its action-slot-0 left-click path.
  - address: "0x005A3AEC"
    text: Copy the active layout's BTN_HELP rectangle into GUIBackPane bottom action slot 0.
  - address: "0x005B8D14"
    text: Build the object-centered light image name mask1%02d.epf from the server-supplied selector.
  - address: "0x005B9450"
    text: Read width times height times six bytes into temporary storage. Copy to the live grid only after the full expected body was read.
  - address: "0x005B94D1"
    text: Open the cache through fopen_s in rb mode. Other readers are allowed, but a concurrent writer blocks this open.
  - address: "0x005B94FA"
    text: The meaningful cache body is exactly map_width times map_height times six bytes.
  - address: "0x005B9573"
    text: A short cache file leaves the prepared grid unchanged. Trailing bytes after the expected body are not checked.
  - address: "0x005B961C"
    text: Close the map reader immediately after the one-shot read; no map-cache handle is retained.
  - address: "0x005B9680"
    text: Client-confirmed MAP writer for the complete six-byte row-major cell buffer used by the reader.
  - address: "0x005B9704"
    text: Open through fopen_s in wb mode. Its Windows handle denies both readers and writers until fclose.
  - address: "0x005B974E"
    text: Write the complete contiguous map buffer once. The write count is not checked, and the caller ignores this function's result.
  - address: "0x005B9761"
    text: fclose flushes any buffered map bytes and releases the exclusive handle before map activation continues.
  - address: "0x005C67E2"
    text: Load gndattr.tbl at WorldControllerPane construction; current map ground tile IDs later index this table.
  - address: "0x005C789E"
    text: Build the current map's six-digit HEA resource name as %06d.hea.
  - address: "0x005C8A4F"
    text: When WorldPane +0x1E9 is set, merge light images attached to visible world objects into the current viewport mask.
  - address: "0x005C8DCE"
