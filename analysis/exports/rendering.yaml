comments:
  - address: "0x00404369"
    text: "Split the registered screen rectangle into 33 vertical child panes, then clear each child canvas with the shared overlay color."
  - address: "0x00404653"
    text: "Load image width, height, and frame count for this AnimationPane; reject zero width or height."
  - address: "0x0040489F"
    text: "Advance the frame modulo frame_count, invalidate the pane, and requeue timer ID 0 using the stored interval."
  - address: "0x00405F20"
    text: "Encode horizontal and vertical flip requests as bits 0 and 1. The optimized blitters use bit 1 to reverse destination row traversal."
  - address: "0x004061A0"
    text: "Rebuild pixel-format-specific 16-bit lookup tables used by the optimized RGB565 or RGB555 software blitters."
  - address: "0x0040692D"
    text: "Force palette index 0 to output pixel value 0 for the zero-transparent indexed blit variant."
  - address: "0x00406E43"
    text: "Skip palette index 0 so transparent source pixels preserve the existing destination pixel."
  - address: "0x0040821E"
    text: "Treat source pixel 0 as transparent; otherwise average source and destination components through the packed 16-bit half-color and carry tables."
  - address: "0x0040B0E7"
    text: "Blend each source pixel over the current destination with one uniform 0..32 weight."
  - address: "0x0040C224"
    text: "Use the second source plane as a per-pixel 0..32 weight while blending the first source over the destination."
  - address: "0x0040D4A0"
    text: Blend mode 0x6D uses a screen-style per-component software blend in RGB565 or RGB555.
  - address: "0x0040DF61"
    text: "Add source and destination color components independently and clamp each component to the RGB565 maximum."
  - address: "0x0040EA24"
    text: "Use RGB555-formatted per-component alpha values while compositing an RGB565 source over the destination."
  - address: "0x0040ED81"
    text: "Saturating RGB565 add: sum each component and clamp red and blue to 31 and green to 63."
  - address: "0x0040F083"
    text: "Resolve this row's alpha run stream from a relative offset stored in the alpha-plane row table."
  - address: "0x00411AE0"
    text: "Load this row's alpha run stream from the absolute pointer stored in the alpha-plane row table."
  - address: "0x004122D6"
    text: "Replicate the color key and global opacity for the MMX alpha-mask comparison and blend."
  - address: "0x00449FA7"
    text: Pass DDFLIP_WAIT. DirectDraw may block until the backbuffer flip can complete; this does not establish a fixed monitor refresh rate.
  - address: "0x0044DE30"
    text: Software Image blitter. Numeric mode selects normal copy, blend-table paths, per-pixel alpha, color effects, or a second image plane.
  - address: "0x0044FB80"
    text: Software PixMap blitter. The common sprite paths treat source pixel zero as transparent.
  - address: "0x004526C0"
    text: Blit a one-bit glyph or mask into the 16-bit software Canvas. The selected mode controls foreground, background, transparency, and averaging.
  - address: "0x00453EFC"
    text: Apply ordered palette mappings during indexed PixMap drawing. Each mapping covers one source-index range and selects a replacement palette family and selector.
  - address: "0x00455BBE"
    text: Split the ANSI byte string with IsDBCSLeadByte. A DBCS pair becomes one 16-bit key with the lead byte in the high half.
  - address: "0x00456F87"
    text: Read EFA header +0x04 as frame_count, then +0x08 as frame_interval_ms. Ordinary world effects prefer a nonzero EFA interval over SEffectLayer's fallback timer.
  - address: "0x0047B902"
    text: Select lod.lft for mode 0, da.lft for mode 1, yami.lft for mode 2, or taiwan.lft for mode 3.
  - address: "0x0047BC09"
    text: Expand LFT rows from their four-byte-aligned source into a one-byte or two-byte-per-row temporary mask according to the glyph advance.
  - address: "0x004819FC"
    text: "Use the source pixel luminance as an index into one of four 32-entry RGB565 palette ramps."
  - address: "0x00481A8A"
    text: "Use the source pixel luminance as an index into one of four 32-entry RGB555 palette ramps."
  - address: "0x004A4D25"
    text: Korean language mode records Windows code page 949; Japanese mode records 932. Other modes leave the code-page value at the system default.
  - address: "0x004C7280"
    text: Open one raw ground-tile bank. Records are fixed 0x5E8-byte blocks, not Windows BMP files; the bank kind selects the palette path.
  - address: "0x004C7390"
    text: Decode one fixed 0x5E8-byte raw tile record as a 56 by 27 indexed slot and pack its 784 diamond pixels into 16-bit color.
  - address: "0x004C78C0"
    text: Apply ground animation first. In alternate mode, try tileas.bmp and fall back to tilea.bmp when the requested alternate record is unavailable.
  - address: "0x00554173"
    text: Present the completed root canvas only when a dirty entry marked the root or a forced redraw is active.
  - address: "0x005542C7"
    text: Load the compiled 10 ms screen interval and use current-time scheduling, so a late callback shifts the next check instead of creating catch-up redraw callbacks.
  - address: "0x00555560"
    text: Recursive pane draw. Clip the pane, invoke primary vtable slot 0x5C, then walk its child subtree.
  - address: "0x00555740"
    text: A forced redraw or dirty pane-tree entry marks the root screen for presentation.
  - address: "0x005558B7"
    text: Draw the current pane through primary-vtable slot 0x5C before visiting its descendants.
  - address: "0x00555A75"
    text: Recurse into the current entry's child subtree after drawing the pane; later sibling entries can paint over earlier siblings.
  - address: "0x0057A6C0"
    text: Select 2x presentation only when desktop color depth is 16 or 32 bits and the current display is at least 1280 by 960; otherwise select 1x for a supported smaller display.
  - address: "0x0057A7E2"
    text: Store the fixed logical width 640 and height 480 before choosing the presentation scale.
  - address: "0x0057A916"
    text: Display mode 2 enables the 2x scale flag while leaving the logical 640 by 480 dimensions unchanged.
  - address: "0x0058747B"
    text: Load gndani.tbl. Each text line is a tile-ID cycle followed by a delay measured in 100 ms ticks.
  - address: "0x005875D2"
    text: Load stcani.tbl. It uses the same line format as gndani.tbl but remaps static tile IDs.
  - address: "0x00587DD9"
    text: Start the shared tile-animation timer at 100 ms. Table delays count these ticks.
  - address: "0x00593490"
    text: Build the two software component tables used by the 16-bit pixel blend helper.
  - address: "0x00593F30"
    text: Initialize DirectDraw presentation, the main and output canvases, color conversion helpers, and blend tables.
  - address: "0x00594250"
    text: Release canvas and software renderer helpers. DirectDraw is released later by the VideoSystem destructor.
