  - address: "0x004C7390"
    text: Decode one fixed 0x5E8-byte raw tile record as a 56 by 27 indexed slot and pack its 784 diamond pixels into 16-bit color.
  - address: "0x004C78C0"
    text: Apply ground animation first. In alternate mode, try tileas.bmp and fall back to tilea.bmp when the requested alternate record is unavailable.
  - address: "0x00555560"
    text: Recursive pane draw. Clip the pane, invoke primary vtable slot 0x5C, then walk its child subtree.
  - address: "0x0058747B"
    text: Load gndani.tbl. Each text line is a tile-ID cycle followed by a delay measured in 100 ms ticks.
  - address: "0x005875D2"
    text: Load stcani.tbl. It uses the same line format as gndani.tbl but remaps static tile IDs.
  - address: "0x00587DD9"
    text: Start the shared tile-animation timer at 100 ms. Table delays count these ticks.
  - address: "0x00593490"
    text: Build the two software component tables used by the 16-bit pixel blend helper.
  - address: "0x00593F30"
    text: Initialize DirectDraw presentation, the main and output canvases, color conversion helpers, and blend tables.
  - address: "0x00594250"
    text: Release canvas and software renderer helpers. DirectDraw is released later by the VideoSystem destructor.
  - address: "0x005942D0"
    text: Present the finished software canvas through DirectDraw or the window DC path.
  - address: "0x00598210"
    text: Deserialize the one-byte SChangeWeather payload. No 0x1F consumer exists in the main gameplay dispatcher.
  - address: "0x005A0FA2"
    text: BTN_HELP is tested only by the pointer-move tooltip path. The left-button path has no help action in this build.
  - address: "0x005B8D14"
    text: Build the object-centered light image name mask1%02d.epf from the server-supplied selector.
  - address: "0x005B9450"
    text: Read exactly width times height times six bytes. A map file has no header and each cell contains three little-endian u16 values.
  - address: "0x005B9680"
    text: Client-confirmed MAP writer for the same six-byte row-major cell buffer used by the reader.
  - address: "0x005C789E"
    text: Build the current map's six-digit HEA resource name as %06d.hea.
  - address: "0x005C8A4F"
    text: When WorldPane +0x1E9 is set, merge light images attached to visible world objects into the current viewport mask.
  - address: "0x005C8DCE"
    text: Merge the object light image with per-pixel maximum so its brighter values open visibility through the dark base mask.
  - address: "0x005CF3B0"
    text: Build a one-based static-tile render table from the high nibble of each SOTP.DAT byte.
  - address: "0x005CF4F0"
    text: Build a one-based static-tile collision table from the low nibble of each SOTP.DAT byte.
  - address: "0x005D3190"
    text: Dispatch the WorldObject draw method through primary vtable slot 0x18.
  - address: "0x005D3740"
    text: Collect clipped visible objects and sort them into 32 world draw-layer queues.
  - address: "0x005D3F70"
    text: World frame order is ground cache, map background images, then sorted world objects.
  - address: "0x005DD380"
    text: Effect drawing uses the common software Image blitter with a blend mode stored on the effect object.
  - address: "0x005DD470"
    text: Advance the effect frame through the sequence loaded from Effect.tbl and request the matching cached image.
  - address: "0x005DEF79"
    text: Rearrange packet-owned appearance fields into HumanAppearanceRecord741. Shield, overcoat, and later accessories move to renderer-specific offsets.
  - address: "0x005E00FB"
    text: Copy the complete 0x30-byte normalized appearance record to WorldObject_Human +0xA4.
  - address: "0x005E0119"
    text: Decoded body sprite 2 makes this human nonblocking in local dynamic-object collision. Other body sprites, including swimming sprite 5, remain blocking.
  - address: "0x005E013B"
    text: Treat appearance is_translucent as true only when its byte equals 1, and mirror it to WorldObject_Human +0xD5.
  - address: "0x005E47FF"
    text: Original JE enters the static draw body when the hidden flag is zero. EB 00 falls into the existing jump to the normal epilogue and hides every static map object.
  - address: "0x005E4880"
    text: SOTP render flag 0x80 selects blend mode 0x6D. Flag 0x40 selects mode 3.
  - address: "0x005EF398"
    text: Scale the SChangeHour time step by two and clamp the Light metadata profile coordinate to 24.
  - address: "0x005EF3F6"
    text: Resolve the current map and scaled time against cached Light metadata, producing ambient RGB, intensity, and an HEA-enable flag.
  - address: "0x005EF444"
    text: Load the current map's HEA spatial mask only when the Light profile permits it and ambient intensity is below 0x20.
  - address: "0x005EF48F"
    text: Darkness mode 3 bypasses the normal Light profile and forces the dark lighting state.
  - address: "0x005F0676"
    text: Direction values 0 through 3 select collision masks 0x01, 0x02, 0x04, and 0x08 for left, down, right, and up.
  - address: "0x005F1D3E"
    text: SMapSize flags use the low nibble for weather mode and bit 0x80 for alternate ground and static art.
  - address: "0x005F1D51"
    text: SMapSize flag 0x80 selects alternate ground and static art, with base-art fallback for missing records or resources.
  - address: "0x005F213B"
    text: Apply the current stored SChangeHour time step after SMapSize installs or refreshes a map.
  - address: "0x005F26C0"
    text: Apply the weather mode saved from SMapSize. Snow mode 1 creates particles, project-named Rain mode 2 has no local setup, and Darkness mode 3 forces dark lighting.
  - address: "0x005F26F0"
    text: Snow mode 1 creates the falling-snow overlay.
  - address: "0x005F2715"
    text: Project-named Rain mode 2 deliberately performs no local setup in this client.
  - address: "0x005F2732"
    text: Darkness mode 3 enables the overall light mask and object-light merge flags, then forces black ambient lighting at intensity zero.
  - address: "0x005FD910"
    text: Suppress the pants part when an overcoat sprite is present; otherwise use the normalized pants sprite, which SDrawHumanObjects sets to 0 or 1.
  - address: "0x005FD939"
    text: Suppress ordinary armor when an overcoat sprite is present.
  - address: "0x005FD9DD"
    text: Suppress ordinary arms when an overcoat sprite is present.
  - address: "0x005FDB6E"
    text: Body resource IDs 1 and 5 use the M filename family. Swimming variants therefore resolve through MM005 or WM005 motion files.
  - address: "0x00600315"
    text: Retain rest_position from HumanAppearanceRecord741 and choose between the two standing-motion setups. Friendly value names remain unresolved.
  - address: "0x006022A9"
    text: Retain HumanAppearanceRecord741 at HumanObjectImageSession +0x0C for body, equipment, dye, face, and motion resource selection.
runtime_patches:
  - id: hide-static-map-art
    rva: "0x001E47FF"
    static_address: "0x005E47FF"
    file_offset_for_reference_only: "0x001E3BFF"
    original_bytes: 74 05
    replacement_bytes: EB 00
    effect: Skip every WorldObject_Static draw through the function's existing normal epilogue; collision remains active.
