comments:
  - address: "0x00405A39"
    text: The game names music files .mus on disk, but the bytes remain MP3 and Miles receives a logical .mp3 name.
  - address: "0x00405C0C"
    text: Pending track changes fade the old stream to zero. This is a fade-out and fade-in sequence, not a simultaneous crossfade.
  - address: "0x00405E35"
    text: BGM fade ticks run every 200 ms through the shared timer event system.
  - address: "0x0042E33A"
    text: Route Bink video sound through the same Miles digital driver used by BGM and sound effects.
  - address: "0x005099B0"
    text: Standard MIDI parsing checks MThd and MTrk chunks. No matching local asset or live play caller was found.
  - address: "0x00540F15"
    text: The options pane exposes levels 0 through 10. SoundManager converts them to Miles volume units in steps of 20.
  - address: "0x00568B9E"
    text: Sound effects are numeric Legend.dat entries. Try <id>.mp3 first and <id>.wav only when the MP3 entry is absent.
  - address: "0x00569422"
    text: Open one Miles digital driver at 22050 Hz, 16-bit, stereo. Retry the same format with default driver flags if the first open fails.
  - address: "0x0059BF30"
    text: Deserialize SSoundEffect. Read one command byte. Only 0xFF adds a second music-selection byte.
  - address: "0x005F6B4E"
    text: SSoundEffect values below 0xFF are numeric sound-effect IDs.
  - address: "0x005F6B62"
    text: For the 0xFF packet form, music value 100 is a no-op sentinel. Other values select music/<id>.mus through the logical .mp3 path.
