comments:
  - address: "0x0045802A"
    text: Return the cached frame immediately when this effect session has already decoded it.
  - address: "0x0045815A"
    text: Allocate an owned 16-bit Image for an EPF effect frame, palette-convert the indexed pixels once, and retain it in the session frame cache.
  - address: "0x00458939"
    text: Destroy every retained EffectImageSession when the pool is explicitly cleared. The clear helper is reached by the pool destructor.
  - address: "0x00458A16"
    text: Create and retain one EffectImageSession the first time this effect ID is requested.
  - address: "0x00471EDF"
    text: Open a DAT read-only with shared-read access and random-access intent before creating its file mapping.
  - address: "0x00471F78"
    text: Map the complete DAT read-only. Legacy entry payloads remain views into this mapping until archive shutdown.
  - address: "0x00472695"
    text: Lease one fixed 0x14-byte entry handle from the archive's bounded handle pool. This is temporary lookup state, not a decoded-asset cache.
  - address: "0x0048B98D"
    text: Point the PixMap primary plane directly into the mapped EPF payload. Ordinary EPF loading does not prerender or copy these indexed pixels.
  - address: "0x0048BBB2"
    text: Resolve a main-archive image synchronously into the caller's PixMap. ImageLib itself does not cache filenames or decoded frames.
  - address: "0x004AA2FB"
    text: Construct the main archive singleton, then open Legend.dat with DarkAges.dat as the only fallback. This archive setup is synchronous startup work.
  - address: "0x004AC6A2"
    text: Close, unmap, and destroy the main archive during normal application shutdown after asset consumers have been released.
  - address: "0x00544F0D"
    text: Load and pack the installed palette families during PaletteMan construction. PAL colors become 256-entry 16-bit tables.
  - address: "0x00548AFC"
    text: Grow this palette family's slot vector in blocks of 16 when a selector exceeds the current capacity.
  - address: "0x00548B2C"
    text: Allocate one 0x200-byte packed palette table on first use of this family and palette index. No runtime eviction path was found.
