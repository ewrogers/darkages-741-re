comments:
  - address: "0x004319B0"
    text: Magic 0xFF02AA55 selects the adaptive HPF tree codec. Input without the magic is copied unchanged.
  - address: "0x00431C40"
    text: HPF bits are read least-significant bit first. Symbol 256 terminates the stream.
  - address: "0x00431D20"
    text: Rotate the tree after every byte and after the 256 terminator. An encoder must apply the same update.
  - address: "0x00440AB6"
    text: Subscribe to the server-managed BItems metadata table.
  - address: "0x00440ACF"
    text: Subscribe to the server-managed BSkills metadata table.
  - address: "0x00440AE7"
    text: Subscribe to the server-managed BSpells metadata table.
  - address: "0x00440B0A"
    text: Retry the subscriptions after 1000 ms if MetaTableManager is not ready.
  - address: "0x00440D2B"
    text: Applying a denial metadata table replaces the current in-memory lookup lists.
  - address: "0x00440D99"
    text: Rows tagged Item populate the item denial lookup used by CUse.
  - address: "0x00440DC3"
    text: Rows tagged Skill populate the skill denial lookup used by CUseSkill.
  - address: "0x00440DED"
    text: Rows tagged Spell populate the spell denial lookup used by CUseSpell.
  - address: "0x00440E48"
    text: Insert the parsed entry into the lookup selected by its Item, Skill, or Spell tag.
  - address: "0x00440EAF"
    text: A metadata event applies the available table and replaces the active denial lists.
  - address: "0x00471E00"
    text: Legacy DAT uses fixed 17-byte index rows and a final blank sentinel. The extended 0xFFFFFFFF path uses XOR and zlib index chunks.
  - address: "0x004874D7"
    text: Scan ascending horizontal band_start_x values until the first checkpoint beyond the clipped rectangle's left edge.
  - address: "0x004874F7"
    text: The candidate HEA band index is computed but not used afterward by client 7.41.
  - address: "0x00487510"
    text: Horizontal RLE skip is measured from band_start_x[0], confirming that the active row-offset table remains band 0.
  - address: "0x00487529"
    text: Use the first band's row-offset table without advancing by the computed band index.
  - address: "0x004875B0"
    text: HEA maps a 0x28-byte header, horizontal band checkpoints, band by scanline offsets, then 16-bit run words.
  - address: "0x004876D0"
    text: HEA screen_width and screen_height are the fixed 640 by 480 logical screen dimensions used to pad the mask canvas.
  - address: "0x0048771C"
    text: Horizontal mask coordinate equals (axis_a - axis_b + map_height) times 28 plus screen_width.
  - address: "0x00487737"
    text: Vertical mask coordinate equals (axis_a + axis_b) times 14 plus screen_height.
  - address: "0x004B8570"
    text: SStipulation mode 0 checks greeting CRC32. Mode 1 inflates and saves replacement greeting text.
  - address: "0x004E4EA0"
    text: Metadata payloads are zlib-compressed, checked with CRC32 after inflate, cached compressed, and parsed into named groups.
  - address: "0x004E53F0"
    text: CMetaData operation zero requests one named metadata table.
  - address: "0x004E57C0"
    text: Inflated metadata is a big-endian group container with length-prefixed byte strings.
  - address: "0x00547810"
    text: Palette tables accept one asset and palette or an inclusive first, last, and palette range. File IDs are one-based.
  - address: "0x00548650"
    text: A PAL file is exactly 256 RGB triples, or 0x300 bytes, with no header.
  - address: "0x0055A650"
    text: Server table text keeps byte zero and swaps pairs starting at byte one. Applying it twice restores the original.
  - address: "0x0058BACB"
    text: ATTR_gnd_paint height 1 becomes the first special ground-tile flag instead of an ordinary paint depth.
  - address: "0x0058BADD"
    text: ATTR_gnd_paint height 2 becomes a second stored flag; the Human movement gate does not read it.
  - address: "0x00593B00"
    text: Palette index zero stays packed zero for color-key transparency. Black at another index is changed to packed value one.
  - address: "0x005B8F30"
    text: This is not CRC-16/XMODEM. The input byte is XORed after the table lookup rather than into the lookup index.
  - address: "0x005C8540"
    text: HEA run high byte is output length. The low six bits are light or occlusion intensity.
  - address: "0x00604530"
    text: Standard IEEE CRC32 used for inflated metadata and decoded server greeting text.
