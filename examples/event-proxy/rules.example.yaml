schema_version: 1
defaults:
  event_types: allow
  client_opcodes: allow
  server_opcodes: allow
rules:
  - domain: event_type
    selector: pointer_move
    value: 0x00
    action: observe
  - domain: event_type
    selector: key_down
    value: 0x08
    action: observe
  - domain: client_opcode
    selector: say
    value: 0x0E
    action: observe
  - domain: server_opcode
    selector: bad_guy
    value: 0x4A
    action: block
notes:
  - The controller parses this YAML and sends compact SET_RULE commands.
  - The injected DLL does not parse YAML or perform file I/O from a hook.
